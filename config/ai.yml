# career-ops — AI model routing  (USER LAYER — never auto-updated)
# ---------------------------------------------------------------------------
# This file decides WHICH model runs WHICH task. Edit it freely: swap a model,
# reorder the fallback chain, or add a whole new provider — no code changes.
#
# A "model spec" is "<provider>:<model-id>", e.g.  nim:deepseek-ai/deepseek-v4-pro
#   - <provider>  is a key under `providers:` below (picks the endpoint + API key)
#   - <model-id>  is the exact slug the provider expects (a wrong slug 404s)
#
# Verify your slugs resolve against the live catalog any time:
#     node ai.mjs verify
# ---------------------------------------------------------------------------

# Provider endpoints. Each is an OpenAI-compatible API + the env var holding its
# key. NVIDIA NIM is the active provider (free tier, ~40 RPM).
providers:
  # freemodel.dev — free, OpenAI-compatible, GPT-5.x family (gpt-5.5 is flagship).
  # Verified live: /v1/chat/completions works with key FREE_MODEL_API_KEY.
  freemodel:
    baseURL: https://api.freemodel.dev/v1
    apiKeyEnv: FREE_MODEL_API_KEY
  # AgentRouter — GLM 5.2 (reasoning) + Claude/DeepSeek relay. Its WAF rejects
  # any client that isn't a real CLI, so we ship a CLI wire-image User-Agent via
  # `headers:` (registry.mjs forwards these). Verified live: glm-5.2 returns 200
  # on /v1/chat/completions with these headers. TPM-capped → keep a fallback.
  agentrouter:
    baseURL: https://agentrouter.org/v1
    apiKeyEnv: AGENT_ROUTER_API_KEY
    headers:
      User-Agent: claude-cli/1.0.60 (external, cli)
      x-app: cli
      x-stainless-lang: js
  # NVIDIA NIM — free tier, kept as the failover safety net for every task.
  nim:
    baseURL: https://integrate.api.nvidia.com/v1
    apiKeyEnv: NVIDIA_NIM_API_KEY
  # NOTE: Aerolink (capi.aerolink.lat) is NOT usable here — it TLS/client-
  # fingerprints and returns "Please use Claude Code CLI" to everything except the
  # real Claude Code binary (even a full wire-image spoof fails). Use it only as
  # your interactive Claude Code model:
  #   export ANTHROPIC_BASE_URL=https://capi.aerolink.lat
  #   export ANTHROPIC_AUTH_TOKEN=$AEROLINK_API_KEY  # Claude Opus 4.8 etc.
  # openrouter:                        # one key, hundreds of models (optional)
  #   baseURL: https://openrouter.ai/api/v1
  #   apiKeyEnv: OPENROUTER_API_KEY

# Model used for any task without an explicit mapping below.
default: freemodel:gpt-5.5

# ROUTING RULE:
#   • RESUME tasks   → Claude Opus 4.8 first (agentrouter relay), GPT 5.5 fallback.
#     Covers: tailor_cv, tailor_cv_json, resume_qa, cover_letter.
#   • COLD MAIL tasks → GPT 5.5 first (freemodel), NIM fallback.
#     Covers: cold_email, connection_notes, draft_referral.
#   • HIGH-VOLUME / mechanical → cheapest fast model (gpt-5.4-mini, nim:*).
#   Every task keeps a free fallback so nothing ever hard-fails.

# Generation defaults (a task entry may override via a {model, temperature, ...} object).
defaults:
  temperature: 0.4
  maxOutputTokens: 8192

# Task -> ordered fallback chain. All tasks run on NVIDIA NIM.
tasks:
  # The flagship decision (A–G report) — low volume, highest stakes → best model
  # available: Claude Opus 4.8 (latest). Free gpt-5.5 + NIM Kimi catch the
  # fallthrough if AgentRouter rate-limits, so this never fails.
  evaluate_job:
    - agentrouter:claude-opus-4-8
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  interview_prep:
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  # Résumé tailoring (the doc that actually gets sent) → best model: Opus 4.8.
  # Free gpt-5.5 + NIM Kimi catch the fallthrough if AgentRouter rate-limits.
  tailor_cv:
    - agentrouter:claude-opus-4-8
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  # JSON-output version of tailor_cv — used by /api/generate-cv-pdf.
  # Opus 4.8 first; codex is the structured-output fallback.
  tailor_cv_json:
    - agentrouter:claude-opus-4-8
    - freemodel:gpt-5.3-codex
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  # Cover letter ships with the résumé → same Opus 4.8 quality bar.
  cover_letter:
    - agentrouter:claude-opus-4-8
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  # ── Cold outreach / LinkedIn — all GPT 5.5 ──────────────────────────────

  # LinkedIn connection note + follow-up referral message.
  connection_notes:
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  draft_referral:
    - freemodel:gpt-5.5
    - nim:minimaxai/minimax-m3
    - nim:moonshotai/kimi-k2.6

  # Cold outreach email (jd_specific | speculative) — short, high-signal.
  cold_email:
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  # Parse a LinkedIn "we're hiring" post → structured JSON (role, email, etc.).
  # High-volume + structured → fast/cheap gpt-5.4-mini.
  parse_hiring_post:
    - freemodel:gpt-5.4-mini
    - nim:moonshotai/kimi-k2.6

  # Post-generation resume QA — multi-perspective review (strict JSON out) → Opus 4.8.
  resume_qa:
    - agentrouter:claude-opus-4-8
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6
    - nim:deepseek-ai/deepseek-v4-pro

  # High-volume summarization → fast/cheap gpt-5.4-mini.
  summarize_report:
    - freemodel:gpt-5.4-mini
    - nim:minimaxai/minimax-m3

  # Who to ask for a referral — reasoning over the candidate's background → gpt-5.5.
  referral_targets:
    - freemodel:gpt-5.5
    - nim:moonshotai/kimi-k2.6

  # Many reports/JDs at once → needs true 1M context, so MiniMax M3 leads here;
  # gpt-5.5 is the quality fallback for smaller batches.
  batch_long_context:
    - nim:minimaxai/minimax-m3
    - freemodel:gpt-5.5

  # Internal agentic steps — frequent + small → cheapest fast model.
  mcp_orchestration:
    - freemodel:gpt-5.4-mini
    - nim:moonshotai/kimi-k2.6
