# Portal Scanner Configuration — Uday Varmora (India DevOps / SRE / Cloud)
# Used by `/career-ops scan` to discover new offers automatically.
#
# Strategy (4 levels):
#   0. Local parser → per-company `parser:` script for SSR/static career pages (zero-token)
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. HTTP JSON (WebFetch) → per-company `api:` on tracked_companies
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: the zero-token scanner (scan.mjs) ONLY reads structured ATS boards
#   (Greenhouse / Ashby / Lever / Workable / Workday / SmartRecruiters / Recruitee).
#   It CANNOT scrape LinkedIn, Naukri, Indeed, Foundit, Instahyre, Wellfound, etc.
#   Those boards are reachable only via the WebSearch `search_queries` below
#   (weaker, may be stale) or by pasting a specific JD/URL into data/pipeline.md
#   and running `/career-ops pipeline`.
#
# Every tracked company below was verified live against its ATS API on
# 2026-06-17 with India-based DevOps/SRE/Cloud/Platform roles present. Boards
# change — if one goes quiet, set enabled: false or swap the slug.
#
# 2026-06-17: added 17 Workday (myworkdayjobs) companies — auto-detected by
# providers/workday.mjs from careers_url (no api: field needed). Also added
# 7 Greenhouse (Okta, New Relic, Samsara, Fivetran, Starburst, ClickHouse,
# Yugabyte), 2 Ashby (Notion, Snowflake), and 2 SmartRecruiters (Freshworks,
# Experian — case-sensitive slugs) companies, all live-verified.

# -- Location filter --
# Applied AFTER title filter, BEFORE dedup. always_allow rescues multi-location
# postings naming your home region; block rejects foreign-only postings.
location_filter:
  always_allow:
    - "Ahmedabad"
    - "Gandhinagar"
    - "GIFT City"
    - "Vadodara"
    - "Baroda"
    - "Pune"
    - "Bangalore"
    - "Bengaluru"
    - "Gurugram"
    - "Gurgaon"
    - "Noida"
    - "Hyderabad"
    - "Mumbai"
    - "Chennai"
    - "Delhi"
  allow:
    - "Remote"
    - "India"
    - "WFH"
    - "Hybrid"
  block:
    - "United States"
    - "USA"
    - "US "
    - "United Kingdom"
    - "UK"
    - "London"
    - "Germany"
    - "France"
    - "Singapore"
    - "Japan"
    - "Brazil"
    - "Australia"
    - "Canada"
    - "Spain"
    - "Ireland"
    - "Netherlands"
    - "Poland"
    - "North America"
    - "EMEA"
    - "LATAM"
    - "Europe"

# -- Title filter --
# At least 1 positive must match AND 0 negatives (case-insensitive).
title_filter:
  positive:
    - "DevOps"
    - "Site Reliability"
    - "SRE"
    - "Cloud Engineer"
    - "Cloud Infrastructure"
    - "Platform Engineer"
    - "Infrastructure Engineer"
    - "Infrastructure Developer"
    - "Systems Engineer"
    - "Systems Administrator"
    - "DevSecOps"
    - "CI/CD"
    - "Release Engineer"
    - "Kubernetes"
    - "Reliability Engineer"
  negative:
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "QA "
    - "Tester"
    - "Sales"
    - "Marketing"
    - "Recruiter"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "II"
    - "III"

# -- jobspy scanner (LinkedIn + Indeed) --
# Consumed by uday-data/scan-jobspy.mjs (not by scan.mjs). This is the only
# automated path into LinkedIn/Indeed, which scan.mjs's ATS providers cannot
# reach. Results flow into the same data/pipeline.md + scan-history.tsv.
#   Run: node uday-data/scan-jobspy.mjs   (npm run scan:jobspy)
# Naukri is omitted — jobspy-node currently gets HTTP 406 (anti-bot) there.
jobspy:
  sites: ["indeed", "linkedin"]
  search_terms:
    - "DevOps Engineer"
    - "Site Reliability Engineer"
    - "Cloud Engineer"
    - "Platform Engineer"
  location: "India"
  results_per_term: 20
  hours_old: 336          # only postings from the last N hours (336 = 14 days)
  # Experience-fit filter — keeps roles whose STATED minimum requirement is
  # <= max_required_years. Reads the JD text (not just the title), so a "Senior"
  # title asking for "2 years" is KEPT, and a plain title asking "6+ years" is
  # DROPPED. Only drops on positive evidence; ambiguous roles are kept.
  fit:
    my_years: 1.5
    max_required_years: 3

# -- remote scanner (We Work Remotely + Remotive + RemoteOK) --
# Consumed by uday-data/scan-remote.mjs. Aggregates the free no-key remote
# boards that actually carry worldwide/India-eligible roles. Other boards
# (Jobicy, Arbeitnow, The Muse, Working Nomads, Himalayas) were tested and
# rejected — US/EU/LATAM-locked or broken filters. Results flow into the same
# data/pipeline.md + scan-history.tsv. Filters applied: title (above) +
# remote-India-eligibility + non-English drop + experience-fit.
#   Run: node uday-data/scan-remote.mjs   (npm run scan:remote)
#   Flags: --dry-run, --no-fit, --loose (keep ambiguous-location roles)
remote:
  fit:
    my_years: 1.5
    max_required_years: 3

# -- Instahyre scanner (India-native DevOps board) --
# Consumed by uday-data/scan-instahyre.mjs. Reads Instahyre's public, no-auth
# JSON endpoint (api/v1/job_search) for the DevOps/Infrastructure job function
# (id 8) — the highest-density India-native source for DevOps/SRE/Cloud roles,
# incl. remote-India ("Work From Home"). Results flow into the same
# data/pipeline.md + scan-history.tsv. NOTE: the anonymous endpoint only honors
# job_functions/limit/offset (experience & location params are ignored), and it
# returns NO JD description — so the experience-fit filter runs title-only
# (correctly drops Senior/Sr./Lead/Manager, keeps base "DevOps Engineer").
# It's an undocumented internal endpoint (can change without notice) — discovery
# only, ToS-gray. Job-function IDs probed: 3=Frontend, 4=PM, 5=QA, 7=Design,
# 8=DevOps/Infra, 10=Backend, 11=Product, 12=Eng-Mgmt.
#   Run: node uday-data/scan-instahyre.mjs   (npm run scan:instahyre)
#   Flags: --dry-run, --no-fit
instahyre:
  job_functions: [8]      # 8 = DevOps / Infrastructure
  pages: 4                # 35 jobs/page → up to ~140 scanned
  fit:
    my_years: 1.5
    max_required_years: 3

# -- YC company discovery (NOT a job scanner) --
# Consumed by uday-data/scan-yc.mjs. YC's job-LEVEL data (workatastartup.com) is
# login-walled + HTTP 406 to scripts, so there's no zero-cost job feed. Instead
# this reads the free yc-oss company directory and surfaces YC companies that are
# hiring AND India-based, writing them to uday-data/yc-india-hiring.md. Many use
# Greenhouse/Ashby/Lever — add the good ones' boards to the companies list below
# so the zero-token `npm run scan` (scan.mjs) picks up their actual roles.
#   Run: node uday-data/scan-yc.mjs   (npm run scan:yc)
#   Flags: --dry-run
yc:
  regions: ["India", "South Asia"]

# -- Hacker News "Who is hiring" scanner (free, no API key) --
# Consumed by uday-data/scan-hn.mjs. Reads the monthly "Ask HN: Who is hiring?"
# thread via the free HN/Algolia search API (no key, ToS-clean). Posts are free
# text, so it keeps a comment only if it mentions a DevOps-ish role AND is India-
# or remote-eligible (explicit India always wins; quietly US/EU-only remote posts
# are pruned), then runs the experience-fit filter. Low volume, high signal.
#   Run: node uday-data/scan-hn.mjs   (npm run scan:hn)
#   Flags: --dry-run, --no-fit, --remote-any (keep any remote, not just India-ok)
hn:
  fit:
    my_years: 1.5
    max_required_years: 3

# -- Adzuna scanner (free official JSON API, India region) --
# Consumed by uday-data/scan-adzuna.mjs. Adzuna is an official, stable JSON API
# (no scraping, ToS-clean) with a real India region. Needs a FREE app_id +
# app_key from https://developer.adzuna.com — put them in a gitignored .env:
#   ADZUNA_APP_ID=xxxx
#   ADZUNA_APP_KEY=xxxx
# Results flow into the same data/pipeline.md + scan-history.tsv. Unlike the
# scrapers, this endpoint returns a JD description, so the experience-fit filter
# parses the STATED years (not just the title).
#   Run: node uday-data/scan-adzuna.mjs   (npm run scan:adzuna)
#   Flags: --dry-run, --no-fit
adzuna:
  country: in             # Adzuna India region code
  search_terms:
    - "devops"
    - "site reliability engineer"
    - "cloud engineer"
    - "platform engineer"
  results_per_term: 50
  max_days_old: 14
  fit:
    my_years: 1.5
    max_required_years: 3

# -- Search queries --
# Each triggers a WebSearch (agent-driven, NOT zero-token). Use site: filters.
# These are the only way to reach LinkedIn / Naukri / Foundit / Instahyre, but
# results are best-effort. Your primary discovery on those boards is still manual.
search_queries:
  - name: LinkedIn — India DevOps/SRE/Cloud
    query: 'site:linkedin.com/jobs "DevOps Engineer" OR "Site Reliability Engineer" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India OR Ahmedabad OR Bangalore OR Pune OR Mumbai OR Hyderabad OR Gurgaon OR Noida OR remote'
    enabled: true

  - name: Naukri — India DevOps/SRE/Cloud
    query: 'site:naukri.com "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India Ahmedabad OR Bangalore OR Pune OR Mumbai OR Hyderabad OR Gurgaon OR Noida'
    enabled: true

  - name: Foundit — India DevOps/SRE
    query: 'site:foundit.in "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India'
    enabled: true

  - name: Instahyre — India DevOps/SRE
    query: 'site:instahyre.com "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer"'
    enabled: true

  - name: Greenhouse — India DevOps/SRE
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India OR Bangalore OR Pune OR Mumbai OR Hyderabad OR Gurgaon OR Noida OR Ahmedabad'
    enabled: true

  - name: Ashby — India DevOps/SRE
    query: 'site:jobs.ashbyhq.com "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India OR Bangalore OR Pune OR Mumbai OR Hyderabad OR Gurgaon OR Noida OR remote'
    enabled: true

  - name: Lever — India DevOps/SRE
    query: 'site:jobs.lever.co "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India OR Bangalore OR Pune OR Mumbai OR Hyderabad OR Gurgaon OR Noida OR remote'
    enabled: true

  - name: Remote DevOps — WeWorkRemotely / Remotive
    query: 'site:weworkremotely.com OR site:remotive.com "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" remote'
    enabled: true

  - name: Wellfound — India/Remote DevOps
    query: 'site:wellfound.com "DevOps" OR "Site Reliability" OR "SRE" OR "Cloud Engineer" OR "Platform Engineer" India OR remote'
    enabled: true

